services:
  claw-voicebox:
    build: .
    container_name: claw-voicebox
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-8080}:8080"
    devices:
      - /dev/snd:/dev/snd  # audio devices for CLI microphone mode
    volumes:
      - ./data/output:/data/output
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach OpenClaw on host
